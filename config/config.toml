# LLM Configuration
[http]
server_port = 9080

[llm]
# 选择当前使用的提供商
# use_provider = "streamlake"
# use_provider = "siliconflow"
use_provider = "xiaomi"

# XiaoMI配置
[llm.providers.xiaomi]
model = "mimo-v2-flash"
temperature = 0.3
max_tokens = 28000
api_base_url = "https://api.xiaomimimo.com/v1"
api_key = "your-key"

# 阿里云配置
[llm.providers.aliyun]
# model = "qwen3-max-preview"
model = "qwen3-coder-plus"
temperature = 0.0
max_tokens = 28000
api_base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "your-key"

# SiliconFlow配置
[llm.providers.siliconflow]
model = "deepseek-ai/DeepSeek-V3.2"
temperature = 0.0
max_tokens = 23000
api_base_url = "https://api.siliconflow.cn/v1"
api_key = "your-key"

# StreamLake配置
[llm.providers.streamlake]
# model = "KAT-Coder-Air-V1"
model = "ep-w1klde-1767706500222997285"
temperature = 0.0
max_tokens = 3000
api_base_url = "https://wanqing.streamlakeapi.com/api/gateway/v1/endpoints"
api_key = "your-key"

# OpenRouter配置
[llm.providers.openrouter]
model = "qwen3-coder-plus"
temperature = 0.0
max_tokens = 3000
api_base_url = "https://openrouter.ai/api/v1"
api_key = "your-key"

# 本地配置
[llm.providers.local]
model = "qwen3-coder-plus"
temperature = 0.0
max_tokens = 3000
api_base_url = "http://127.0.0.1:8000"
api_key = "your-key"

# 其他模型配置示例
[llm.providers.moonshot]
model = "moonshotai/Kimi-K2-Instruct"
temperature = 0.0
max_tokens = 3000
api_base_url = "https://api.moonshot.cn/v1"
api_key = "your-key"

[llm.providers.deepseek]
model = "deepseek-ai/DeepSeek-V3"
temperature = 0.0
max_tokens = 3000
api_base_url = "https://api.deepseek.com/v1"
api_key = "your-key"

[llm.providers.zai]
model = "zai-org/GLM-4.5-Air"
temperature = 0.0
max_tokens = 3000
api_base_url = "https://api.zai.org/v1"
api_key = "your-key"

[llm.providers.mistral]
model = "mistralai/devstral-small"
temperature = 0.0
max_tokens = 3000
api_base_url = "https://api.mistral.ai/v1"
api_key = "your-key"

# AWS Bedrock 配置
[llm.providers.bedrock]
model = "us.anthropic.claude-3-7-sonnet-20250219-v1:0"
temperature = 0.0
max_tokens = 3000
aws_region = "us-east-1"
# aws_profile = "default"  # 可选：使用特定的AWS profile
# model_provider = "anthropic"  # 可选：显式指定模型提供商（自动检测）

# Bedrock Nova 模型示例
[llm.providers.bedrock-nova]
model = "us.amazon.nova-lite-v1:0"
temperature = 0.0
max_tokens = 3000
aws_region = "us-east-1"

# Bedrock Meta 模型示例
[llm.providers.bedrock-meta]
model = "us.meta.llama3-1-405b-instruct-v1:0"
temperature = 0.0
max_tokens = 3000
aws_region = "us-east-1"

[app]
enable_streaming = true

[agent]
conductor_max_steps = 30
coding_max_steps = 50
repo_max_steps = 30
lang = "Chinese"