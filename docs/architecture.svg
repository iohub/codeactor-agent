<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <linearGradient id="grad-interaction" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="grad-agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/><stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="grad-security" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/><stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="grad-msg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="grad-tool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/><stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="grad-infra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/><stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="1180" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">CodeActor Agent — System Architecture</text>
  <text x="480" y="56" text-anchor="middle" font-size="11" fill="#9ca3af">Hub-and-Spoke Multi-Agent · openai-go SDK · Rust Codebase Engine</text>

  <!-- ============================================================ -->
  <!-- LAYER 1: Interaction -->
  <!-- ============================================================ -->
  <rect x="140" y="72" width="810" height="90" rx="8" fill="url(#grad-interaction)" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="0" y="72" width="130" height="40" rx="6" fill="#3b82f6"/>
  <text x="65" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">INTERACTION</text>

  <rect x="155" y="88" width="200" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="255" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">TUI</text>
  <text x="255" y="124" text-anchor="middle" font-size="10.5" fill="#64748b">Bubble Tea + Lipgloss</text>
  <text x="255" y="138" text-anchor="middle" font-size="10" fill="#93c5fd">interactive auth · animation</text>

  <rect x="375" y="88" width="200" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="475" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">HTTP + WebSocket</text>
  <text x="475" y="124" text-anchor="middle" font-size="10.5" fill="#64748b">Gin + Melody</text>
  <text x="475" y="138" text-anchor="middle" font-size="10" fill="#93c5fd">REST API · WS streaming</text>

  <rect x="595" y="88" width="155" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="672" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Node.js CLI</text>
  <text x="672" y="124" text-anchor="middle" font-size="10.5" fill="#64748b">WebSocket client</text>
  <text x="672" y="138" text-anchor="middle" font-size="10" fill="#93c5fd">run · chat · status</text>

  <rect x="770" y="88" width="155" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="848" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Task Manager</text>
  <text x="848" y="124" text-anchor="middle" font-size="10.5" fill="#64748b">lifecycle · cancel</text>
  <text x="848" y="138" text-anchor="middle" font-size="10" fill="#93c5fd">persist · history</text>

  <!-- Arrow: Interaction → Agent -->
  <line x1="480" y1="162" x2="480" y2="185" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: Agent -->
  <!-- ============================================================ -->
  <rect x="140" y="190" width="810" height="195" rx="8" fill="url(#grad-agent)" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="0" y="190" width="130" height="40" rx="6" fill="#7c3aed"/>
  <text x="65" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">AGENT</text>

  <!-- CodingAssistant -->
  <rect x="360" y="208" width="270" height="30" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="495" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">CodingAssistant · LLM-Tool Loop</text>

  <line x1="495" y1="238" x2="495" y2="250" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ConductorAgent -->
  <rect x="260" y="253" width="470" height="52" rx="6" fill="#fff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="495" y="273" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">ConductorAgent</text>
  <text x="495" y="294" text-anchor="middle" font-size="10.5" fill="#6b7280">orchestrate → delegate → review → iterate (max 30 steps)</text>

  <!-- Five sub-agents -->
  <line x1="307" y1="305" x2="225" y2="334" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="401" y1="305" x2="388" y2="334" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="495" y1="305" x2="551" y2="334" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="589" y1="305" x2="714" y2="334" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="683" y1="305" x2="877" y2="334" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="155" y="334" width="140" height="40" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="225" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">RepoAgent</text>
  <text x="225" y="366" text-anchor="middle" font-size="9" fill="#7c3aed">read-only</text>

  <rect x="318" y="334" width="140" height="40" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="388" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">CodingAgent</text>
  <text x="388" y="366" text-anchor="middle" font-size="9" fill="#7c3aed">read/write · 17 tools</text>

  <rect x="481" y="334" width="140" height="40" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="551" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">ChatAgent</text>
  <text x="551" y="366" text-anchor="middle" font-size="9" fill="#7c3aed">3 tools · t=0.7</text>

  <rect x="644" y="334" width="140" height="40" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="714" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">DevOpsAgent</text>
  <text x="714" y="366" text-anchor="middle" font-size="9" fill="#16a34a">run_bash · 8 tools</text>

  <rect x="807" y="334" width="140" height="40" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="877" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">MetaAgent</text>
  <text x="877" y="366" text-anchor="middle" font-size="9" fill="#7c3aed">design → register</text>

  <!-- Agent → Security -->
  <line x1="225" y1="385" x2="225" y2="410" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="877" y1="385" x2="877" y2="410" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ============================================================ -->
  <!-- LAYER 3: Security / Authorization -->
  <!-- ============================================================ -->
  <rect x="140" y="415" width="810" height="68" rx="8" fill="url(#grad-security)" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="0" y="415" width="130" height="40" rx="6" fill="#dc2626"/>
  <text x="65" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">SECURITY</text>

  <rect x="210" y="430" width="260" height="38" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="340" y="454" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">WorkspaceGuard</text>
  <text x="340" y="463" text-anchor="middle" font-size="9.5" fill="#64748b">path boundary · danger detection</text>

  <line x1="480" y1="449" x2="520" y2="449" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="530" y="430" width="260" height="38" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="660" y="454" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">UserConfirmManager</text>
  <text x="660" y="463" text-anchor="middle" font-size="9.5" fill="#64748b">allow / deny / allow_session</text>

  <!-- Security → Message Bus -->
  <line x1="400" y1="483" x2="400" y2="508" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- LAYER 4: Message Bus -->
  <!-- ============================================================ -->
  <rect x="140" y="513" width="810" height="102" rx="8" fill="url(#grad-msg)" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="0" y="513" width="130" height="40" rx="6" fill="#16a34a"/>
  <text x="65" y="538" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">MESSAGE BUS</text>

  <rect x="300" y="533" width="390" height="34" rx="6" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="495" y="555" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">MessageDispatcher ⬝ Pub-Sub Event Bus (buffer: 100)</text>

  <line x1="380" y1="567" x2="240" y2="592" stroke="#16a34a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="610" y1="567" x2="750" y2="592" stroke="#16a34a" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="170" y="586" width="200" height="22" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="270" y="601" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">TUIConsumer ⬝ terminal</text>

  <rect x="620" y="586" width="270" height="22" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="755" y="601" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">WebSocketConsumer ⬝ JSON broadcast</text>

  <!-- Message Bus → Tools -->
  <line x1="400" y1="615" x2="400" y2="640" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="755" y1="615" x2="755" y2="640" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- LAYER 5: Tools (17 tools in 4 columns) -->
  <!-- ============================================================ -->
  <rect x="140" y="645" width="810" height="170" rx="8" fill="url(#grad-tool)" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="0" y="645" width="130" height="40" rx="6" fill="#ea580c"/>
  <text x="65" y="670" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">TOOLS 17</text>

  <!-- File Ops -->
  <rect x="155" y="662" width="190" height="140" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="250" y="680" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">File Operations</text>
  <line x1="165" y1="686" x2="335" y2="686" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="165" y="701" font-size="10" fill="#4b5563">read_file</text>
  <text x="270" y="701" font-size="10" fill="#4b5563">create_file</text>
  <text x="165" y="718" font-size="10" fill="#4b5563">delete_file</text>
  <text x="270" y="718" font-size="10" fill="#4b5563">rename_file</text>
  <text x="165" y="735" font-size="10" fill="#4b5563">list_dir</text>
  <text x="270" y="735" font-size="10" fill="#4b5563">print_dir_tree</text>
  <text x="165" y="752" font-size="10" fill="#4b5563">search_replace_in_file</text>
  <text x="165" y="769" font-size="9" fill="#f97316">↳ returns unified diff</text>

  <!-- Search & Repo -->
  <rect x="360" y="662" width="190" height="140" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="455" y="680" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">Search &amp; Repo</text>
  <line x1="370" y1="686" x2="540" y2="686" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="370" y="701" font-size="10" fill="#4b5563">search_by_regex</text>
  <text x="370" y="718" font-size="10" fill="#4b5563">semantic_search (vector)</text>
  <text x="370" y="735" font-size="10" fill="#4b5563">query_code_skeleton</text>
  <text x="370" y="752" font-size="10" fill="#4b5563">query_code_snippet</text>
  <text x="370" y="769" font-size="9" fill="#f97316">↱ call graph · hierarchy</text>

  <!-- System & Edit -->
  <rect x="565" y="662" width="190" height="140" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="660" y="680" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">System &amp; Edit</text>
  <line x1="575" y1="686" x2="745" y2="686" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="575" y="701" font-size="10" fill="#4b5563">run_bash (fg/bg)</text>
  <text x="575" y="718" font-size="10" fill="#4b5563">ImplPlan (stateful)</text>
  <text x="575" y="735" font-size="10" fill="#4b5563">finish · ask_user</text>
  <text x="575" y="752" font-size="10" fill="#4b5563">delegate_repo</text>
  <text x="575" y="769" font-size="9" fill="#f97316">delegate_coding/chat/devops/meta</text>

  <!-- Cognitive -->
  <rect x="770" y="662" width="155" height="140" rx="6" fill="#fff" stroke="#fdba74" stroke-width="1"/>
  <text x="848" y="680" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">Cognitive</text>
  <line x1="780" y1="686" x2="915" y2="686" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="780" y="701" font-size="10" fill="#4b5563">thinking (reflect)</text>
  <text x="780" y="718" font-size="10" fill="#4b5563">micro_agent (sub-LLM)</text>
  <text x="780" y="735" font-size="10" fill="#4b5563">Adapter pattern</text>
  <text x="780" y="752" font-size="10" fill="#4b5563">ToolFunc → Tool</text>
  <text x="780" y="769" font-size="9" fill="#f97316">Function Calling</text>

  <!-- Tools → Infra -->
  <line x1="400" y1="815" x2="400" y2="840" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="755" y1="815" x2="755" y2="840" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- LAYER 6: Infrastructure -->
  <!-- ============================================================ -->
  <rect x="140" y="845" width="810" height="190" rx="8" fill="url(#grad-infra)" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="0" y="845" width="130" height="40" rx="6" fill="#4b5563"/>
  <text x="65" y="870" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">INFRA</text>

  <!-- LLM Providers -->
  <rect x="155" y="867" width="380" height="115" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="345" y="887" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">LLM Providers (openai-go/v3)</text>
  <text x="345" y="904" text-anchor="middle" font-size="10.5" fill="#4b5563">Custom Engine abstraction · 13 providers</text>
  <line x1="170" y1="911" x2="520" y2="911" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="345" y="927" text-anchor="middle" font-size="10" fill="#6b7280">xiaomi · aliyun · siliconflow · deepseek · moonshot</text>
  <text x="345" y="943" text-anchor="middle" font-size="10" fill="#6b7280">mistral · z.ai · openrouter · streamlake · bedrock</text>
  <text x="345" y="959" text-anchor="middle" font-size="10" fill="#6b7280">DeepSeek reasoning_content · streaming + non-streaming</text>
  <text x="345" y="975" text-anchor="middle" font-size="9" fill="#9ca3af">LoggingEngine → ~/.codeactor/logs/llm-{date}.log</text>

  <!-- Codebase Service -->
  <rect x="555" y="867" width="380" height="115" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="745" y="887" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Codebase Service (Rust)</text>
  <text x="745" y="904" text-anchor="middle" font-size="10.5" fill="#4b5563">auto-launch · health-check · retry ×3 · cleanup</text>
  <line x1="570" y1="911" x2="920" y2="911" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="745" y="927" text-anchor="middle" font-size="10" fill="#6b7280">Tree-sitter: Rust · Python · JS/TS · Java · C++ · Go</text>
  <text x="745" y="943" text-anchor="middle" font-size="10" fill="#6b7280">Call Graph · Complexity · Hierarchy Tree</text>
  <text x="745" y="959" text-anchor="middle" font-size="10" fill="#6b7280">LanceDB + SQLite · text-embedding-3-small (1536d)</text>
  <text x="745" y="975" text-anchor="middle" font-size="9" fill="#9ca3af">File watcher (notify) · 20s debounce re-index</text>

  <!-- Data & Memory -->
  <rect x="155" y="995" width="780" height="28" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="0.8"/>
  <text x="545" y="1014" text-anchor="middle" font-size="10.5" fill="#92400e">DataManager (task persistence: ~/.codeactor/tasks/{taskID}.json) · ConversationMemory (300 msg limit) · embedbin (~/.codeactor/bin/)</text>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="280" y="1045" width="400" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="1064" text-anchor="middle" font-size="10" fill="#64748b">solid arrows = direct invocation · dashed = event publishing via MessageDispatcher · red = security gate</text>
</svg>
